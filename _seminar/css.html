<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>HTML + CSS</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px;
      }

      .card {
        background: #378add;
        border-radius: 12px;
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 280px;
      }

      .card h3 {
        color: #fff;
        margin: 0;
        font-size: 18px;
      }

      .card p {
        color: #b5d4f4;
        margin: 0;
        font-size: 14px;
        line-height: 1.6;
      }

      .btn {
        background: #fff;
        color: #185fa5;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        align-self: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h3>Hello Tailwind!</h3>
      <p>So sánh Tailwind và CSS</p>
      <button class="btn">Bắt đầu</button>
    </div>
  </body>
</html>
